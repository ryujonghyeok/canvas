<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Beta Quiz 2 Interactive</title>
    <style>
        :root {
            --max-color: #d1e5f0; /* Light blue from image */
            --max-stroke: #7fb3d5;
            --min-color: #f5b7b1; /* Reddish from image */
            --min-stroke: #e74c3c;
            --leaf-color: #d7bde2; /* Purple from image */
            --leaf-stroke: #8e44ad;
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --pruned-opacity: 0.2;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #header { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0; color: var(--text-color); font-size: 1.8rem; }

        #visualization-container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #tree-svg { flex: 1; width: 100%; height: 100%; }

        #controls {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #fafafa;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background: #f0f0f0; border-color: #bbb; }
        #next-btn { background: var(--accent-color); color: white; border: none; }
        #next-btn:hover:not(:disabled) { background: #2980b9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 300px;
            z-index: 10;
        }

        #step-desc { font-size: 0.9rem; color: #34495e; line-height: 1.5; font-weight: 500; }

        /* SVG Components */
        .node-max { fill: var(--max-color); stroke: var(--max-stroke); stroke-width: 2px; }
        .node-min { fill: var(--min-color); stroke: var(--min-stroke); stroke-width: 2px; }
        .node-leaf { fill: var(--leaf-color); stroke: var(--leaf-stroke); stroke-width: 2px; }
        
        .edge { stroke: #333; stroke-width: 1.5px; fill: none; }
        .edge-label { font-size: 14px; font-weight: bold; font-style: italic; }
        
        .pruned polygon, .pruned rect, .pruned circle { 
            fill: #eeeeee !important; 
            stroke: #cccccc !important; 
        }
        .pruned text { 
            fill: #bbbbbb !important; 
        }
        .pruned-edge { 
            stroke: #cccccc !important; 
            stroke-dasharray: 4; 
        }
        
        .node-val-text { font-size: 14px; font-weight: bold; text-anchor: middle; }
        .ab-info { font-size: 11px; fill: #7f8c8d; font-family: monospace; font-weight: bold; }
        .highlight-circle { stroke: var(--accent-color); stroke-width: 4px; fill: none; filter: drop-shadow(0 0 3px var(--accent-color)); }
    </style>
</head>
<body>

    <div id="header">
        <h1>Alpha-Beta Quiz 2 Solver</h1>
    </div>

    <div id="visualization-container">
        <div id="status-panel">
            <div id="step-desc">Ready. Click "Next Step" to trace the algorithm.</div>
        </div>
        <svg id="tree-svg" viewBox="0 0 1000 600"></svg>
        <div id="controls">
            <button id="reset-btn">Reset Quiz</button>
            <button id="prev-btn" disabled>Previous</button>
            <button id="next-btn">Next Step</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('tree-svg');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const resetBtn = document.getElementById('reset-btn');
        const stepDesc = document.getElementById('step-desc');

        // Tree structure based on image
        const leafVals = [10, 6, 100, 8, 1, 2, 20, 4];
        const edgeLabels = {
            '0-1': 'a', '0-2': 'h',
            '1-3': 'b', '1-4': 'e', '2-5': 'i', '2-6': 'l',
            '3-7': 'c', '3-8': 'd', '4-9': 'f', '4-10': 'g',
            '5-11': 'j', '5-12': 'k', '6-13': 'm', '6-14': 'n'
        };

        let nodes = [];
        let edges = [];
        let steps = [];
        let currentStepIndex = -1;

        function buildTree() {
            nodes = []; edges = [];
            const w = 1000, h = 600;
            const vGap = 130;
            const top = 80;

            // Root (0)
            nodes.push({ id: 0, type: 'MAX', x: w/2, y: top, parent: null, children: [1, 2] });
            
            // L1 (1, 2)
            nodes.push({ id: 1, type: 'MIN', x: w*0.3, y: top+vGap, parent: 0, children: [3, 4] });
            nodes.push({ id: 2, type: 'MIN', x: w*0.7, y: top+vGap, parent: 0, children: [5, 6] });
            
            // L2 (3, 4, 5, 6)
            for(let i=0; i<4; i++) {
                const x = w * (0.15 + i*0.233);
                nodes.push({ id: i+3, type: 'MAX', x, y: top+vGap*2, parent: i<2 ? 1 : 2, children: [7+i*2, 8+i*2] });
            }

            // Leaves (7-14)
            for(let i=0; i<8; i++) {
                const x = w * (0.08 + i*0.12);
                nodes.push({ id: i+7, type: 'LEAF', x, y: top+vGap*3, parent: Math.floor(i/2)+3, value: leafVals[i] });
            }

            // Create edges
            nodes.forEach(n => {
                if(n.children) {
                    n.children.forEach(cid => {
                        edges.push({ from: n.id, to: cid, label: edgeLabels[`${n.id}-${cid}`] });
                    });
                }
            });
        }

        function generateSteps() {
            steps = [];
            function solve(nodeId, alpha, beta) {
                const node = nodes[nodeId];
                steps.push({ nodeId, alpha, beta, type: 'VISIT', desc: `Entering node ${nodeId}. Range: [${f(alpha)}, ${f(beta)}]` });

                if(node.type === 'LEAF') {
                    steps.push({ nodeId, alpha, beta, value: node.value, type: 'RETURN', desc: `Leaf reached: ${node.value}` });
                    return node.value;
                }

                let v = node.type === 'MAX' ? -Infinity : Infinity;
                for(let i=0; i<node.children.length; i++) {
                    const childVal = solve(node.children[i], alpha, beta);
                    
                    if(node.type === 'MAX') {
                        v = Math.max(v, childVal);
                        alpha = Math.max(alpha, v);
                    } else {
                        v = Math.min(v, childVal);
                        beta = Math.min(beta, v);
                    }

                    const isLast = i === node.children.length - 1;
                    steps.push({ nodeId, alpha, beta, value: v, type: 'UPDATE', concluded: isLast, 
                        desc: `${node.type} updated to ${v}. Range: [${f(alpha)}, ${f(beta)}]` });

                    if(beta <= alpha) {
                        if(!isLast) {
                            steps.push({ nodeId, alpha, beta, value: v, type: 'PRUNE', 
                                desc: `PRUNE! Because ${f(beta)} ≤ ${f(alpha)}, remaining branches are cut.` });
                        }
                        return v;
                    }
                }
                return v;
            }
            function f(v) { return v === Infinity ? '∞' : (v === -Infinity ? '-∞' : v); }
            solve(0, -Infinity, Infinity);
        }

        function render() {
            svg.innerHTML = '';
            
            // Edges
            edges.forEach(e => {
                const from = nodes[e.from], to = nodes[e.to];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", from.x); line.setAttribute("y1", from.y);
                line.setAttribute("x2", to.x); line.setAttribute("y2", to.y);
                line.setAttribute("class", "edge");
                line.setAttribute("id", `edge-${e.from}-${e.to}`);
                svg.appendChild(line);

                const midX = (from.x + to.x) / 2;
                const midY = (from.y + to.y) / 2;
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", midX + (from.x < to.x ? -10 : 10));
                t.setAttribute("y", midY - 5);
                t.setAttribute("class", "edge-label");
                t.textContent = e.label;
                svg.appendChild(t);
            });

            // Nodes
            nodes.forEach(n => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("id", `g-${n.id}`);

                if(n.type === 'LEAF') {
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", n.x-25); rect.setAttribute("y", n.y-25);
                    rect.setAttribute("width", 50); rect.setAttribute("height", 50);
                    rect.setAttribute("class", "node-leaf");
                    rect.setAttribute("id", `node-${n.id}`);
                    g.appendChild(rect);
                    
                    const val = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    val.setAttribute("x", n.x); val.setAttribute("y", n.y+6);
                    val.setAttribute("class", "node-val-text");
                    val.textContent = n.value;
                    g.appendChild(val);
                } else {
                    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    const s = 30;
                    let pts = n.type === 'MAX' ? 
                        `${n.x},${n.y-s} ${n.x-s},${n.y+s} ${n.x+s},${n.y+s}` :
                        `${n.x},${n.y+s} ${n.x-s},${n.y-s} ${n.x+s},${n.y-s}`;
                    poly.setAttribute("points", pts);
                    poly.setAttribute("class", n.type === 'MAX' ? "node-max" : "node-min");
                    poly.setAttribute("id", `node-${n.id}`);
                    g.appendChild(poly);

                    const val = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    val.setAttribute("x", n.x);
                    val.setAttribute("y", n.type === 'MAX' ? n.y+15 : n.y-5);
                    val.setAttribute("class", "node-val-text");
                    val.setAttribute("id", `val-${n.id}`);
                    g.appendChild(val);

                    const ab = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    ab.setAttribute("x", n.x + 40); ab.setAttribute("y", n.y);
                    ab.setAttribute("class", "ab-info");
                    ab.setAttribute("id", `ab-${n.id}`);
                    g.appendChild(ab);
                }
                svg.appendChild(g);
            });

            // Highlight circle (hidden)
            const cursor = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            cursor.setAttribute("r", 40); cursor.setAttribute("class", "highlight-circle");
            cursor.setAttribute("id", "cursor");
            cursor.setAttribute("visibility", "hidden");
            svg.appendChild(cursor);
        }

        function updateUI() {
            // Reset
            nodes.forEach(n => {
                document.getElementById(`g-${n.id}`).classList.remove('pruned');
                if(n.type !== 'LEAF') {
                    document.getElementById(`val-${n.id}`).textContent = "";
                    document.getElementById(`ab-${n.id}`).textContent = "";
                }
            });
            edges.forEach(e => {
                const el = document.getElementById(`edge-${e.from}-${e.to}`);
                el.classList.remove('pruned-edge', 'active-edge');
                el.style.stroke = "#333"; el.style.strokeWidth = "1.5px";
            });

            const cursor = document.getElementById('cursor');
            cursor.setAttribute("visibility", "hidden");

            // Replay
            for(let i=0; i<=currentStepIndex; i++) {
                const s = steps[i];
                const node = nodes[s.nodeId];
                
                if(node.type !== 'LEAF') {
                    const valEl = document.getElementById(`val-${node.id}`);
                    const abEl = document.getElementById(`ab-${node.id}`);
                    if(s.value !== null && s.value !== undefined && !isNaN(s.value) && Math.abs(s.value) !== Infinity) {
                        const pref = s.concluded ? "" : (node.type === 'MAX' ? "≥" : "≤");
                        valEl.textContent = `${pref}${s.value}`;
                    }
                    abEl.textContent = `[${f(s.alpha)}, ${f(s.beta)}]`;
                }

                if(i === currentStepIndex) {
                    stepDesc.textContent = s.desc;
                    cursor.setAttribute("cx", node.x); cursor.setAttribute("cy", node.y);
                    cursor.setAttribute("visibility", "visible");
                    if(node.parent !== null) {
                        const edge = document.getElementById(`edge-${node.parent}-${node.id}`);
                        edge.style.stroke = "var(--accent-color)";
                        edge.style.strokeWidth = "4px";
                    }
                }

                if(s.type === 'PRUNE') {
                    const parent = nodes[s.nodeId];
                    const triggerId = steps[i-1].nodeId;
                    let found = false;
                    parent.children.forEach(cid => {
                        if(found) markPruned(cid);
                        if(cid === triggerId) found = true;
                    });
                }
            }

            function markPruned(id) {
                document.getElementById(`g-${id}`).classList.add('pruned');
                const n = nodes[id];
                if(n.parent !== null) document.getElementById(`edge-${n.parent}-${id}`).classList.add('pruned-edge');
                if(n.children) n.children.forEach(markPruned);
            }

            function f(v) { return v === Infinity ? '∞' : (v === -Infinity ? '-∞' : v); }
            prevBtn.disabled = currentStepIndex < 0;
            nextBtn.disabled = currentStepIndex >= steps.length - 1;
        }

        nextBtn.addEventListener('click', () => { currentStepIndex++; updateUI(); });
        prevBtn.addEventListener('click', () => { currentStepIndex--; updateUI(); });
        resetBtn.addEventListener('click', () => { currentStepIndex = -1; updateUI(); stepDesc.textContent = "Tracing reset. Click Next Step."; });

        buildTree();
        generateSteps();
        render();
        updateUI();
    </script>
</body>
</html>
