<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCTS Phases Visualizer</title>
<style>
  :root {
    --bg: #f4f4f4;
    --panel: #ffffff;
    --border: #d9d9d9;
    --text: #222222;
    --muted: #666666;
    --blue: #2563eb;
    --green: #0f766e;
    --orange: #b45309;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .page { max-width: 1400px; margin: 0 auto; padding: 20px; }

  .topbar, .message {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  .topbar { padding: 18px; }

  h1 { font-size: 1.6rem; margin-bottom: 6px; }

  .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.5; }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 16px;
  }

  button {
    border: 1px solid var(--border);
    background: #fafafa;
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font: inherit;
  }

  button:hover { background: #f0f0f0; }
  button:disabled { opacity: 0.55; cursor: not-allowed; }

  .phase-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .phase {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    background: #fafafa;
    font-size: 0.9rem;
    text-align: center;
  }

  .phase.active { border-color: var(--blue); background: #eef4ff; color: var(--blue); font-weight: 600; }
  .phase.done   { border-color: #b6d6cc; background: #eef8f5; color: var(--green); }

  .stage-wrap { overflow: auto; margin-top: 18px; }

  .stage {
    position: relative;
    width: 1200px;
    height: 680px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .edge         { fill: none; stroke: #cfcfcf; stroke-width: 4; stroke-linecap: round; }
  .edge.walked  { stroke: var(--blue);   stroke-width: 6; }
  .edge.preview { stroke: #9ec0ff;       stroke-width: 5; }
  .edge.updated { stroke: var(--orange); stroke-width: 6; }

  .nodes { position: absolute; inset: 0; }

  .node {
    position: absolute;
    width: 140px;
    transform: translate(-50%, -50%);
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #ffffff;
    padding: 14px 12px;
    text-align: center;
  }

  .node.here     { border-color: var(--blue);   box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
  .node.walked   { border-color: #9ec0ff; background: #f7fbff; }
  .node.stop     { border-color: var(--orange); background: #fff7f0; }
  .node.new-node { border-color: var(--green);  background: #f2fbf8; }
  .node.updated  { border-color: var(--orange); }

  .node-tag {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .node-label { font-size: 1.4rem; font-weight: 700; }

  .node-outcome {
    margin-top: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 8px;
  }

  .node-outcome.win  { background: #d1fae5; color: #065f46; }
  .node-outcome.loss { background: #fee2e2; color: #991b1b; }

  .message {
    margin-top: 18px;
    padding: 16px 18px;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .message strong { color: var(--blue); }
</style>
</head>
<body>
<div class="page">
  <section class="topbar">
    <h1>Monte Carlo Tree Search</h1>
    <p class="subtitle">
      One MCTS iteration: <strong>Selection</strong> walks down the tree,
      <strong>Expansion</strong> adds one new child,
      <strong>Simulation</strong> plays a random game,
      <strong>Backpropagation</strong> updates every node on the path.
    </p>

    <div class="controls">
      <button id="nextBtn">Next step</button>
      <button id="playBtn">Play all steps</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="phase-row">
      <div id="phase-selection"      class="phase active">1. Selection</div>
      <div id="phase-expansion"      class="phase">2. Expansion</div>
      <div id="phase-simulation"     class="phase">3. Simulation</div>
      <div id="phase-backpropagation"class="phase">4. Backpropagation</div>
    </div>
  </section>

  <div class="stage-wrap">
    <section class="stage">
      <svg id="edges" viewBox="0 0 1200 680" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div id="nodes" class="nodes"></div>
    </section>
  </div>

  <section id="message" class="message"></section>
</div>

<script>
  // ─── Tree layout positions (% of stage) ──────────────────────────────────

  const POSITIONS = {
    root:   { x: 50, y: 10 },
    A:      { x: 20, y: 34 }, B: { x: 50, y: 34 }, C: { x: 80, y: 34 },
    B1:     { x: 40, y: 60 }, B2: { x: 60, y: 60 },
    B1_new: { x: 40, y: 86 }
  };

  // ─── Starting tree ────────────────────────────────────────────────────────
  // visits is tracked internally so selection knows which nodes are "fresh"

  const STARTING_TREE = {
    root: { label: 'Root', visits: 32, children: ['A', 'B', 'C'] },
    A:    { label: 'A',    visits: 16, children: [] },
    B:    { label: 'B',    visits: 10, children: ['B1', 'B2'] },
    C:    { label: 'C',    visits:  6, children: [] },
    B1:   { label: 'B1',  visits:  6, children: [] },
    B2:   { label: 'B2',  visits:  4, children: [] }
  };

  // Simulation outcome for each possible selection stop (pre-set for the demo)
  const SIMULATION_OUTCOME = { A: 'loss', B1: 'win', B2: 'win', C: 'win' };

  // ─── Mutable state ────────────────────────────────────────────────────────

  const state = {
    tree:             fresh_tree(),
    current_node:     'root',
    path:             ['root'],   // nodes walked during selection
    selection_stop:   null,       // where selection ended
    new_child:        null,       // the freshly expanded node
    simulation_result: null,      // 'win' or 'loss'
    done:             false,
    timer:            null
  };

  const ui = {
    nextBtn:    document.getElementById('nextBtn'),
    playBtn:    document.getElementById('playBtn'),
    resetBtn:   document.getElementById('resetBtn'),
    edgesSvg:   document.getElementById('edges'),
    nodesDiv:   document.getElementById('nodes'),
    message:    document.getElementById('message'),
    pSelection: document.getElementById('phase-selection'),
    pExpansion: document.getElementById('phase-expansion'),
    pSimulation:document.getElementById('phase-simulation'),
    pBackprop:  document.getElementById('phase-backpropagation')
  };

  // ─── Helpers ──────────────────────────────────────────────────────────────

  function fresh_tree() {
    return JSON.parse(JSON.stringify(STARTING_TREE));
  }

  function get_node(id) { return state.tree[id]; }

  function which_phase() {
    if (state.done)                   return 'backpropagation';
    if (state.simulation_result)      return 'simulation';
    if (state.new_child)              return 'expansion';
    return 'selection';
  }

  // Selection rule: always visit an unvisited child first.
  // If all children have been visited before, go toward the most-visited one
  // (a stand-in for "most promising" without showing any formula).
  function pick_best_child(parent_id) {
    const children = get_node(parent_id).children.map(id => ({ id, node: get_node(id) }));
    const fresh = children.find(c => c.node.visits === 0);
    if (fresh) return fresh;
    return children.reduce((best, c) => c.node.visits > best.node.visits ? c : best);
  }

  function next_ucb1_preview() {
    if (which_phase() !== 'selection' || state.selection_stop) return null;
    const node = get_node(state.current_node);
    if (node.children.length === 0) return null;
    return pick_best_child(state.current_node).id;
  }

  // ─── The four MCTS phases ─────────────────────────────────────────────────

  function advance_one_step() {
    if (state.done) { stop_timer(); refresh(); return; }

    // ==========================================
    // PHASE 1: SELECTION (Walk down the tree)
    // ==========================================
    // Keep moving to the most promising child until we hit a dead end.
    if (!state.selection_stop) {
      walk_down_one_level();
    }

    // ==========================================
    // PHASE 2: EXPANSION (Add one new child)
    // ==========================================
    // We've reached a node that hasn't been fully explored. Dig one new branch.
    else if (!state.new_child) {
      add_one_fresh_child();
    }

    // ==========================================
    // PHASE 3: SIMULATION (Play a random game)
    // ==========================================
    // From the new child, play randomly until the game ends. Record the result.
    else if (!state.simulation_result) {
      play_random_game_to_the_end();
    }

    // ==========================================
    // PHASE 4: BACKPROPAGATION (Update the path)
    // ==========================================
    // Walk back up and tell every node we visited: "this path led to X result."
    else {
      walk_back_up_and_tell_every_node_the_result();
    }

    refresh();
  }

  function walk_down_one_level() {
    const node = get_node(state.current_node);

    // This node has no children — it's a leaf, selection stops here
    if (node.children.length === 0) {
      state.selection_stop = state.current_node;
      return;
    }

    const best = pick_best_child(state.current_node);
    state.current_node = best.id;
    state.path.push(best.id);

    // If the chosen child is also a leaf, selection stops here too
    if (get_node(best.id).children.length === 0) {
      state.selection_stop = best.id;
    }
  }

  function add_one_fresh_child() {
    const parent_id = state.selection_stop;
    const new_id    = `${parent_id}_new`;
    get_node(parent_id).children.push(new_id);
    state.tree[new_id] = { label: 'New', visits: 0, children: [] };
    state.new_child = new_id;
  }

  function play_random_game_to_the_end() {
    state.simulation_result = SIMULATION_OUTCOME[state.selection_stop];
  }

  function walk_back_up_and_tell_every_node_the_result() {
    // Increment visits on every node we touched so backprop is visible
    [...state.path, state.new_child].forEach(id => get_node(id).visits += 1);
    state.done = true;
    stop_timer();
  }

  // ─── Controls ─────────────────────────────────────────────────────────────

  function play_all_steps_automatically() {
    if (state.done) return;
    stop_timer();
    state.timer = setInterval(() => {
      if (state.done) { stop_timer(); refresh(); return; }
      advance_one_step();
    }, 900);
    refresh();
  }

  function stop_timer() {
    if (state.timer) { clearInterval(state.timer); state.timer = null; }
  }

  function reset() {
    stop_timer();
    Object.assign(state, {
      tree: fresh_tree(), current_node: 'root', path: ['root'],
      selection_stop: null, new_child: null,
      simulation_result: null, done: false, timer: null
    });
    refresh();
  }

  // ─── Rendering ────────────────────────────────────────────────────────────

  function draw_edges() {
    const preview   = next_ucb1_preview();
    const walked    = new Set();
    for (let i = 0; i < state.path.length - 1; i++) walked.add(`${state.path[i]}->${state.path[i+1]}`);
    if (state.new_child) walked.add(`${state.selection_stop}->${state.new_child}`);

    const backprop_nodes = state.done
      ? new Set([...state.path, state.new_child]) : new Set();

    const svgs = [];
    Object.entries(state.tree).forEach(([parent_id, node]) => {
      node.children.forEach(child_id => {
        const from = POSITIONS[parent_id], to = POSITIONS[child_id];
        if (!from || !to) return;

        const key = `${parent_id}->${child_id}`;
        const cls = ['edge',
          walked.has(key)                                                          ? 'walked'   : '',
          !state.done && parent_id === state.current_node && child_id === preview  ? 'preview'  : '',
          state.done && backprop_nodes.has(parent_id) && backprop_nodes.has(child_id) ? 'updated' : ''
        ].filter(Boolean).join(' ');

        const x1 = from.x * 12, y1 = from.y * 6.8;
        const x2 = to.x * 12,   y2 = to.y * 6.8;
        const cy = ((from.y + to.y) / 2) * 6.8;
        svgs.push(`<path class="${cls}" d="M${x1} ${y1} C${x1} ${cy},${x2} ${cy},${x2} ${y2}"></path>`);
      });
    });

    ui.edgesSvg.innerHTML = svgs.join('');
  }

  function draw_nodes() {
    const preview = next_ucb1_preview();
    const backprop_nodes = state.done ? new Set([...state.path, state.new_child]) : new Set();

    ui.nodesDiv.innerHTML = Object.entries(state.tree).map(([id, node]) => {
      const pos = POSITIONS[id];
      if (!pos) return '';

      const classes = ['node'];
      if (state.path.includes(id))                                  classes.push('walked');
      if (id === state.current_node && !state.selection_stop)        classes.push('here');
      if (id === state.selection_stop)                               classes.push('stop');
      if (id === state.new_child)                                    classes.push('new-node');
      if (backprop_nodes.has(id))                                    classes.push('updated');

      // Tag that describes the node's role right now
      let tag = 'visited before';
      if (id === state.new_child)                                           tag = 'brand new';
      else if (node.visits === 0)                                           tag = 'never visited';
      else if (id === state.selection_stop && !state.new_child)             tag = 'selection stop';
      else if (id === preview && !state.selection_stop)                     tag = 'going here next';
      else if (id === state.current_node && !state.selection_stop)          tag = 'we are here';
      else if (backprop_nodes.has(id))                                      tag = 'score updated';

      // Show win/loss badge only on the new child after simulation
      let outcome_badge = '';
      if (id === state.new_child && state.simulation_result) {
        outcome_badge = `<div class="node-outcome ${state.simulation_result}">${state.simulation_result.toUpperCase()}</div>`;
      }

      return `
        <div class="${classes.join(' ')}" style="left:${pos.x}%;top:${pos.y}%;">
          <div class="node-tag">${tag}</div>
          <div class="node-label">${node.label}</div>
          ${outcome_badge}
        </div>`;
    }).join('');
  }

  function highlight_phases() {
    const phase = which_phase();
    const order = ['selection', 'expansion', 'simulation', 'backpropagation'];
    const active = order.indexOf(phase);
    [ui.pSelection, ui.pExpansion, ui.pSimulation, ui.pBackprop].forEach((el, i) => {
      el.className = 'phase';
      if (i < active) el.classList.add('done');
      else if (i === active) el.classList.add('active');
    });
  }

  function update_message() {
    const phase = which_phase();
    let text = '';

    if (phase === 'selection') {
      if (!state.selection_stop) {
        const next = pick_best_child(state.current_node);
        const is_fresh = next.node.visits === 0;
        text = `We are at <strong>${get_node(state.current_node).label}</strong>. `
          + (is_fresh
            ? `<strong>${next.node.label}</strong> has never been visited — going there.`
            : `Heading toward <strong>${next.node.label}</strong>, the most promising branch.`);
      } else {
        text = `Selection stopped at <strong>${get_node(state.selection_stop).label}</strong>. `
          + `It is a leaf with no children yet — time to expand.`;
      }
    } else if (phase === 'expansion') {
      text = `Added a brand-new child under <strong>${get_node(state.selection_stop).label}</strong>. `
        + `This is a move the AI has never thought about before.`;
    } else if (phase === 'simulation') {
      text = `Played a random game all the way to the end from the new child. Result: `
        + `<strong>${state.simulation_result.toUpperCase()}</strong>.`;
    } else {
      text = `Walking back up the path and telling every node we visited: `
        + `"this line of play ended in a <strong>${state.simulation_result}</strong>." `
        + `Scores updated.`;
    }

    ui.message.innerHTML = text;
    ui.nextBtn.disabled  = state.done;
    ui.playBtn.disabled  = state.done;
    ui.playBtn.textContent = state.timer ? 'Playing…' : 'Play all steps';
  }

  function refresh() {
    highlight_phases();
    draw_edges();
    draw_nodes();
    update_message();
  }

  // ─── Wire up buttons ──────────────────────────────────────────────────────

  ui.nextBtn.addEventListener('click', advance_one_step);
  ui.playBtn.addEventListener('click', play_all_steps_automatically);
  ui.resetBtn.addEventListener('click', reset);

  refresh();
</script>
</body>
</html>
