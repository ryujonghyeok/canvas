<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequential Timing - Advanced Waveform Analysis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --clk: #10b981;
      --q: #3b82f6;
      --d: #f59e0b;
      --delay: #ef4444;
      --setup: #8b5cf6;
      --hold: #ec4899;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    header { text-align: center; }
    h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    p.desc { color: var(--text-muted); font-size: 0.85rem; }

    .circuit-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafafa;
      position: relative;
      overflow: hidden;
    }

    svg { width: 100%; height: auto; display: block; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      align-items: center;
      background: #f1f5f9;
      padding: 0.7rem;
      border-radius: 12px;
    }

    .key-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: white;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
    }

    button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--text);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .waveform-container {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .constraint-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      padding: 1rem;
      border-radius: 12px;
    }

    .formula {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #92400e;
      text-align: center;
      margin: 0.5rem 0;
      background: white;
      padding: 0.7rem;
      border-radius: 8px;
    }

    input[type=range] { accent-color: var(--clk); cursor: pointer; }

    /* Smooth transitions for elements that react to the slider */
    #edge-line, #next-setup-rect, #next-setup-text {
      transition: x 0.15s ease-out, x1 0.15s ease-out, x2 0.15s ease-out, fill 0.2s;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Refined Sequential Timing</h1>
    <p class="desc">Interactive Next Clock Wave Animation and Constraint Check</p>
  </header>

  <div class="circuit-box">
    <svg viewBox="0 0 800 240" id="circuit-svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
      </defs>

      <!-- DFF -->
      <rect x="150" y="60" width="100" height="120" rx="8" fill="white" stroke="#1e293b" stroke-width="2" id="rect-dff" />
      <text x="200" y="125" text-anchor="middle" font-weight="700" fill="#3b82f6">DFF</text>
      <polygon points="150,150 165,160 150,170" fill="#1e293b" />
      <text x="160" y="85" font-size="12" font-weight="600" fill="#94a3b8">D</text>
      <text x="235" y="85" font-size="12" font-weight="600" fill="#94a3b8">Q</text>

      <!-- Logic -->
      <rect x="400" y="60" width="160" height="120" rx="8" fill="white" stroke="#1e293b" stroke-width="2" id="rect-comb" />
      <text x="480" y="115" text-anchor="middle" font-weight="700" fill="#f59e0b">Combinational</text>
      <text x="480" y="135" text-anchor="middle" font-weight="700" fill="#f59e0b">Logic</text>

      <!-- Wires -->
      <path d="M 50 190 L 100 190 L 100 160 L 150 160" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)" id="wire-clk" />
      <path d="M 250 80 L 400 80" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)" id="wire-q" />
      <path d="M 560 120 L 650 120 L 650 220 L 80 220 L 80 80 L 150 80" fill="none" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)" id="wire-d" />

      <!-- Dots -->
      <circle id="dot-clk" r="6" fill="#10b981" opacity="0" />
      <circle id="dot-q" r="6" fill="#3b82f6" opacity="0" />
      <circle id="dot-d" r="6" fill="#f59e0b" opacity="0" />
    </svg>
  </div>

  <div class="controls">
    <button id="play-btn">Play</button>
    <div id="status-text" style="flex: 1; text-align: center; font-size: 0.8rem; font-weight: 600;">Ready</div>
    <div style="display: flex; gap: 0.4rem;">
      <span class="key-hint">SPACE</span> <span class="key-hint">← / →</span>
    </div>
  </div>

  <div class="waveform-container">
    <svg viewBox="0 0 800 220" id="waveform-svg">
      <!-- 50% Threshold Dash Lines -->
      <line x1="100" y1="45" x2="750" y2="45" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2" />
      <line x1="100" y1="95" x2="750" y2="95" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2" />
      <line x1="100" y1="145" x2="750" y2="145" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2" />

      <line x1="100" y1="20" x2="100" y2="200" stroke="#cbd5e1" stroke-width="2" />
      <text x="90" y="50" text-anchor="end" font-size="12" font-weight="600" fill="#64748b">CLK</text>
      <text x="90" y="100" text-anchor="end" font-size="12" font-weight="600" fill="#64748b">Q</text>
      <text x="90" y="150" text-anchor="end" font-size="12" font-weight="600" fill="#64748b">D (In)</text>

      <path id="wave-clk" d="M 100 60" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
      <path id="wave-q" d="M 100 110" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
      <path id="wave-d" d="M 100 160" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />

      <!-- Fixed Setup/Hold 1 -->
      <rect x="165" y="20" width="71" height="180" fill="#8b5cf6" opacity="0.1" />
      <text x="200" y="15" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="700">t_setup</text>
      <rect x="236" y="20" width="74" height="180" fill="#ec4899" opacity="0.1" />
      <text x="273" y="15" text-anchor="middle" font-size="9" fill="#ec4899" font-weight="700">t_hold</text>

      <!-- Next Clock Edge (Slider Dependent) -->
      <g id="next-edge">
        <line id="edge-line" x1="680" y1="20" x2="680" y2="200" stroke="#10b981" stroke-width="2" stroke-dasharray="4" />
        <rect id="next-setup-rect" x="615" y="20" width="65" height="180" fill="#8b5cf6" opacity="0.2" />
        <text id="next-setup-text" x="647" y="15" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="700">t_setup (Next)</text>
      </g>
      
      <!-- Timing Measures -->
      <g id="measure-ffpd" opacity="0">
        <path d="M 236 95 L 366 95" stroke="#ef4444" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
        <text x="301" y="90" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="700">t_ffpd</text>
        <line x1="236" y1="20" x2="236" y2="200" stroke="#ef4444" stroke-dasharray="3" stroke-width="1" />
        <line x1="366" y1="20" x2="366" y2="200" stroke="#ef4444" stroke-dasharray="3" stroke-width="1" />
      </g>
      
      <g id="measure-comb" opacity="0">
        <path d="M 366 145 L 587 145" stroke="#ef4444" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
        <text x="476" y="160" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="700">t_comb</text>
        <line x1="587" y1="20" x2="587" y2="200" stroke="#ef4444" stroke-dasharray="3" stroke-width="1" />
      </g>
      
      <line id="time-line" x1="100" y1="20" x2="100" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="2" />
    </svg>
  </div>

  <div class="constraint-box">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3 style="font-size: 0.9rem;">Adjust T_clk (Next Cycle)</h3>
      <input type="range" id="clk-slider" min="300" max="600" value="450" style="width: 200px;">
    </div>
    <div class="formula" id="formula-box">T_clk ≥ t_ffpd + t_comb + t_setup</div>
    <div id="alert" style="text-align: center; font-weight: 700; height: 1.2rem; font-size: 0.85rem;"></div>
  </div>
</div>

<script>
  const clkSlider = document.getElementById('clk-slider');
  const formulaBox = document.getElementById('formula-box');
  const alertText = document.getElementById('alert');
  const playBtn = document.getElementById('play-btn');
  const statusText = document.getElementById('status-text');
  
  const waveClkPath = document.getElementById('wave-clk');
  const waveQPath = document.getElementById('wave-q');
  const waveDPath = document.getElementById('wave-d');
  const timeLine = document.getElementById('time-line');
  const nextSetupRect = document.getElementById('next-setup-rect');
  const nextSetupText = document.getElementById('next-setup-text');
  const edgeLine = document.getElementById('edge-line');
  const rectDff = document.getElementById('rect-dff');
  const rectComb = document.getElementById('rect-comb');
  const dotClk = document.getElementById('dot-clk');
  const dotQ = document.getElementById('dot-q');
  const dotD = document.getElementById('dot-d');

  const TOTAL_DURATION = 10000;
  let currentTime = 0;
  let isPlaying = false;
  let lastFrameTime = 0;

  // Critical Timing X-coordinates
  const T_SETUP_VAL = 65;

  function updateVisuals() {
    const progress = currentTime / TOTAL_DURATION;
    // waveX now scales up to 850 to ensure the next clock edge can be fully drawn and animated
    const waveX = 100 + progress * 750; 
    
    // Position of the NEXT clock edge (50% threshold)
    const tClkX = 236 + parseInt(clkSlider.value); 
    const criticalX = 587; // 50% point of D rising after comb logic

    timeLine.setAttribute('x1', waveX);
    timeLine.setAttribute('x2', waveX);

    // Slider-controlled "Next" elements
    edgeLine.setAttribute('x1', tClkX);
    edgeLine.setAttribute('x2', tClkX);
    nextSetupRect.setAttribute('x', tClkX - T_SETUP_VAL);
    nextSetupText.setAttribute('x', tClkX - T_SETUP_VAL / 2);

    // Timing Violation Check
    const isViolated = (tClkX - T_SETUP_VAL) < criticalX;
    if (isViolated) {
      alertText.textContent = "⚠️ SETUP VIOLATION: D is changing during setup window!";
      alertText.style.color = "#ef4444";
      formulaBox.style.background = "#fee2e2";
      nextSetupRect.setAttribute('fill', '#ef4444');
    } else {
      alertText.textContent = "✓ Timing constraint satisfied";
      alertText.style.color = "#10b981";
      formulaBox.style.background = "white";
      nextSetupRect.setAttribute('fill', '#8b5cf6');
    }

    // Full waveform generation including the NEXT clock edge!
    updateWaveSkewed(waveClkPath, 60, waveX, [
      {x: 230, y: 30}, 
      {x: 295, y: 60}, 
      {x: tClkX - 6, y: 30}, // Next rise
      {x: tClkX + 59, y: 60} // Next fall
    ]);
    
    updateWaveSkewed(waveQPath, 110, waveX, [
      {x: 360, y: 80}
    ]);
    
    updateWaveSkewed(waveDPath, 160, waveX, [
      {x: 130, y: 130}, 
      {x: 310, y: 160}, 
      {x: 581, y: 130}  
    ]);

    // Marker Visibility over time
    document.getElementById('measure-ffpd').setAttribute('opacity', progress > 0.38 ? 1 : 0);
    document.getElementById('measure-comb').setAttribute('opacity', progress > 0.65 ? 1 : 0);

    // Completely mapped Circuit Animation based on physical position of waveX
    resetDots();
    if (waveX >= 200 && waveX <= 240) {
      showDot(dotClk, 'wire-clk', normalize(waveX, [200, 240]));
      statusText.textContent = "Clock propagating to DFF...";
    } else if (waveX > 240 && waveX <= 350) {
      rectDff.setAttribute('fill', '#dbeafe');
      statusText.textContent = "DFF Internal Delay (t_ffpd)...";
    } else if (waveX > 350 && waveX <= 380) {
      showDot(dotQ, 'wire-q', normalize(waveX, [350, 380]));
      statusText.textContent = "Q output propagating...";
    } else if (waveX > 380 && waveX <= 570) {
      rectComb.setAttribute('fill', '#fef3c7');
      statusText.textContent = "Combinational Logic Processing (t_comb)...";
    } else if (waveX > 570 && waveX <= 610) {
      showDot(dotD, 'wire-d', normalize(waveX, [570, 610]));
      statusText.textContent = "Next state calculating and feedback...";
    } else if (waveX >= tClkX - 30 && waveX <= tClkX + 10) {
      // ANIMATING THE NEXT CLOCK EDGE
      showDot(dotClk, 'wire-clk', normalize(waveX, [tClkX - 30, tClkX + 10]));
      statusText.textContent = "Next Clock propagating to DFF...";
    } else if (waveX < 200) {
      statusText.textContent = "Input D is stable before Clock (Setup Check)";
    } else if (waveX > 610 && waveX < tClkX - 30) {
      statusText.textContent = "Monitoring Stability / Next state calculation";
    } else {
      statusText.textContent = "Cycle complete. Awaiting next clock.";
    }
  }

  function updateWaveSkewed(path, startY, currentX, steps) {
    const skew = 12;
    let d = `M 100 ${startY}`;
    let curX = 100;
    let curY = startY;
    for (const step of steps) {
      if (currentX <= curX) break;
      const nextX = Math.min(currentX, step.x);
      d += ` L ${nextX} ${curY}`;
      curX = nextX;
      if (currentX <= step.x) break;
      const transEndX = Math.min(currentX, step.x + skew);
      const p = (transEndX - step.x) / skew;
      const targetY = step.y;
      const transY = curY + (targetY - curY) * p;
      d += ` L ${transEndX} ${transY}`;
      curX = transEndX; curY = transY;
      if (currentX <= step.x + skew) break;
      curY = targetY;
    }
    if (currentX > curX) d += ` L ${currentX} ${curY}`;
    path.setAttribute('d', d);
  }

  function showDot(dot, pathId, frac) {
    dot.setAttribute('opacity', 1);
    const path = document.getElementById(pathId);
    const len = path.getTotalLength();
    const pt = path.getPointAtLength(frac * len);
    dot.setAttribute('cx', pt.x); dot.setAttribute('cy', pt.y);
  }

  function resetDots() {
    [dotClk, dotQ, dotD].forEach(d => d.setAttribute('opacity', 0));
    rectDff.setAttribute('fill', 'white');
    rectComb.setAttribute('fill', 'white');
  }

  function normalize(val, range) {
    return (val - range[0]) / (range[1] - range[0]);
  }

  function frame(timestamp) {
    if (!isPlaying) return;
    const delta = timestamp - lastFrameTime;
    lastFrameTime = timestamp;
    currentTime = (currentTime + delta) % TOTAL_DURATION;
    updateVisuals();
    requestAnimationFrame(frame);
  }

  playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? "Pause" : "Resume";
    if (isPlaying) { lastFrameTime = performance.now(); requestAnimationFrame(frame); }
  });

  clkSlider.addEventListener('input', updateVisuals);

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    else if (e.code === 'ArrowRight') { currentTime = (currentTime + 200) % TOTAL_DURATION; updateVisuals(); }
    else if (e.code === 'ArrowLeft') { currentTime = (currentTime - 200 + TOTAL_DURATION) % TOTAL_DURATION; updateVisuals(); }
  });

  updateVisuals();
</script>
</body>
</html>
